<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sorry Yashuu ❤️</title>
    <style>
        body {
            background: linear-gradient(to right, #ff9a9e, #fad0c4);
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 100px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 350px;
            margin: auto;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
        }

        h1 {
            color: #ff4d6d;
        }

        p {
            font-size: 18px;
            color: #333;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            background-color: #ff4d6d;
            color: white;
            font-size: 16px;
            border-radius: 10px;
            cursor: pointer;
        }

        button:hover {
            background-color: #e63950;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>I'm Sorry 😔</h1>
    <p>Yashuu, I really didn’t mean to hurt you...</p>
    <p>Please forgive me 🥺</p>

    <button onclick="showLove()">Click if you forgive me 💖</button>

    <p id="loveMsg" class="hidden">Yashuu... I Love You So Much ❤️</p>
</div>

<script>
    function showLove() {
        document.getElementById("loveMsg").classList.remove("hidden");
    }
</script>

</body>
</html>
